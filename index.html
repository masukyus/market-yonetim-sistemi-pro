    /* =============================================
       ENCODING-SAFE TEXT HELPER
    ============================================= */
    function setNodeText(selector, text) {
        const el = (typeof selector === 'string')
            ? document.querySelector(selector)
            : selector;
        if (el) el.textContent = text;
    }

    /* =============================================
       XSS GUARD
    ============================================= */
    function escapeHtml(str) {
        if (str == null) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    // Render sonrasinda gorunen metinlerde kalan encoding bozulmalarini duzelt.
        function normalizeVisibleText(root) {
        const host = root || document.body;
        const rules = [
            [/\u00C3\u00B6/g, '\u00F6'],
            [/\u00C3\u00BC/g, '\u00FC'],
            [/\u00C3\u00A7/g, '\u00E7'],
            [/\u00C4\u00B1/g, '\u0131'],
            [/\u00C4\u00B0/g, '\u0130'],
            [/\u00C5\u009F/g, '\u015F'],
            [/\u00C5\u009E/g, '\u015E'],
            [/\u00C4\u009F/g, '\u011F'],
            [/\u00C4\u009E/g, '\u011E'],
            [/\u00C3\u0096/g, '\u00D6'],
            [/\u00C3\u009C/g, '\u00DC'],
            [/\uFFFD/g, ''],
            [/\?{2}r\?nler/g, '\u00DCr\u00FCnler'],
            [/\?{2}\s*Rozetler/g, 'Rozetler'],
            [/\?{1,2}\s*G\u00FCnl\u00FCk G\u00F6revler/g, '\uD83D\uDCCB G\u00FCnl\u00FCk G\u00F6revler'],
            [/SKT Ge\u00E7mi.?x/g, 'SKT Ge\u00E7mi\u015F'],
            [/Ba.?xlang\u0131\u00E7/g, 'Ba\u015Flang\u0131\u00E7'],
            [/\u0130\u00E7eri.?xi/g, '\u0130\u00E7eri\u011Fi'],
            [/\Şifre/g, '\u015Eifre'],
            [/\?\s*\u0130\u015Fleniyor\.\.\./g, '\u23F3 \u0130\u015Fleniyor...'],
            [/\?\s*Kay\u0131t Ol/g, '\uD83D\uDCDD Kay\u0131t Ol'],
            [/\?\s*Giri\u015F Yap/g, '\uD83D\uDD10 Giri\u015F Yap']
        ];

        const tw = document.createTreeWalker(host, NodeFilter.SHOW_TEXT);
        const nodes = [];
        while (tw.nextNode()) nodes.push(tw.currentNode);
        nodes.forEach((node) => {
            let t = node.nodeValue || '';
            if (!t.trim()) return;
            rules.forEach(([re, to]) => { t = t.replace(re, to); });
            node.nodeValue = t;
        });
    }
    /* =============================================
       ZXING LOAD GUARD
    ============================================= */
    function waitForZXing(ms) {
        ms = ms || 8000;
        return new Promise(function(resolve, reject) {
            if (typeof ZXing !== 'undefined') { resolve(); return; }
            var deadline = Date.now() + ms;
            function tick() {
                if (typeof ZXing !== 'undefined') { resolve(); return; }
                if (Date.now() >= deadline) { reject(new Error('ZXing yüklenmedi')); return; }
                setTimeout(tick, 150);
            }
            setTimeout(tick, 150);
        });
    }

    /* =============================================
       BARCODE SCANNER v5
    ============================================= */
    const Scanner = (function () {
        var BD_TIMEOUT_MS    = 5000;
        var SCAN_INTERVAL_MS = 120;
        var MAX_VIDEO_W      = 1280;

        var _stream    = null;
        var _reader    = null;
        var _canvas    = null;
        var _ctx       = null;
        var _rafId     = null;
        var _scanTimer = null;
        var _bdTimer   = null;
        var _open      = false;
        var _handled   = false;
        var _track     = null;
        var _torchOn   = false;

        function getVideo() { return document.getElementById('scannerVideo'); }
        function setStatus(msg)  { setNodeText('.scanner-status',       msg); }
        function setEngine(lbl)  { setNodeText('.scanner-engine-label', lbl); }

        function cancelBD()   { if (_bdTimer)   { clearTimeout(_bdTimer);      _bdTimer   = null; } }
        function cancelRAF()  { if (_rafId)     { cancelAnimationFrame(_rafId); _rafId    = null; } }
        function cancelScan() { if (_scanTimer) { clearInterval(_scanTimer);   _scanTimer = null; } }

        function acquireStream() {
            var c1 = { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } };
            var c2 = { video: { facingMode: { ideal: 'environment' } } };
            var c3 = { video: true };
            return navigator.mediaDevices.getUserMedia(c1)
                .catch(function () { return navigator.mediaDevices.getUserMedia(c2); })
                .catch(function () { return navigator.mediaDevices.getUserMedia(c3); });
        }

        function waitForVideoReady(video) {
            return new Promise(function (resolve) {
                if (video.readyState >= 2) { resolve(); return; }
                var t = setTimeout(resolve, 3000);
                video.addEventListener('canplay', function h() {
                    clearTimeout(t);
                    video.removeEventListener('canplay', h);
                    resolve();
                });
            });
        }

        function beep() {
            try {
                var ctx = new (window.AudioContext || window.webkitAudioContext)();
                var osc = ctx.createOscillator();
                var gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 1047;
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
                osc.start();
                osc.stop(ctx.currentTime + 0.12);
            } catch (e) {}
        }

        function deliver(raw) {
            if (_handled) return;
            _handled = true;
            cancelBD(); cancelRAF(); cancelScan();

            var barcode = String(raw).trim();
            if (!barcode) return;

            try { if ('vibrate' in navigator) navigator.vibrate([60, 30, 60]); } catch (e) {}
            beep();

            var vp = document.querySelector('.scanner-viewport');
            if (vp) {
                var fl = document.createElement('div');
                fl.className = 'scan-success-flash';
                vp.appendChild(fl);
                setTimeout(function () { if (fl.parentNode) fl.parentNode.removeChild(fl); }, 600);
            }

            store.newProduct.barcode = barcode;
            scannerOpen = false;
            close();
            showToast('✅ Barkod: ' + barcode, 'success');
            render();
            // Katalog lookup ile ürün adı + no otomatik doldur
            setTimeout(function() { catalogLookup(barcode); }, 80);
        }

        function runBarcodeDetector(video) {
            return new Promise(function (resolve, reject) {
                if (!('BarcodeDetector' in window)) { reject('unsupported'); return; }
                var det;
                try {
                    det = new BarcodeDetector({
                        formats: ['ean_13','ean_8','upc_a','upc_e','code_128','code_39','itf','qr_code','data_matrix']
                    });
                } catch (e) { reject('init-failed'); return; }

                var done = false;
                _bdTimer = setTimeout(function () {
                    if (done) return;
                    done = true; cancelRAF(); reject('timeout');
                }, BD_TIMEOUT_MS);

                function loop() {
                    if (!_open || done) return;
                    if (video.readyState < 2 || video.paused || video.ended) {
                        _rafId = requestAnimationFrame(loop); return;
                    }
                    det.detect(video).then(function (codes) {
                        if (done) return;
                        if (codes && codes.length && codes[0].rawValue) {
                            done = true; cancelBD(); resolve(codes[0].rawValue);
                        } else {
                            _rafId = requestAnimationFrame(loop);
                        }
                    }).catch(function () { _rafId = requestAnimationFrame(loop); });
                }
                _rafId = requestAnimationFrame(loop);
            });
        }

        function runZXingCanvas(video) {
            return waitForZXing().then(function () {
                return new Promise(function (resolve, reject) {
                    var fmts = [
                        ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
                        ZXing.BarcodeFormat.UPC_A,  ZXing.BarcodeFormat.UPC_E,
                        ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.CODE_39,
                        ZXing.BarcodeFormat.ITF,    ZXing.BarcodeFormat.QR_CODE,
                        ZXing.BarcodeFormat.DATA_MATRIX
                    ];
                    var hints = new Map([
                        [ZXing.DecodeHintType.POSSIBLE_FORMATS,           fmts],
                        [ZXing.DecodeHintType.TRY_HARDER,                 true],
                        [ZXing.DecodeHintType.ASSUME_CODE_39_CHECK_DIGIT, true],
                        [ZXing.DecodeHintType.CHARACTER_SET,              'UTF-8']
                    ]);

                    if (!_canvas) { _canvas = document.createElement('canvas'); _ctx = _canvas.getContext('2d'); }
                    if (_reader) { try { _reader.reset(); } catch (e) {} }
                    _reader = new ZXing.BrowserMultiFormatReader(hints);

                    var done = false;

                    function scanFrame() {
                        if (!_open || done) return;
                        if (video.readyState < 2 || video.paused || video.ended || video.videoWidth === 0) return;
                        var scale = Math.min(1, MAX_VIDEO_W / video.videoWidth);
                        var w = Math.floor(video.videoWidth  * scale);
                        var h = Math.floor(video.videoHeight * scale);
                        if (_canvas.width !== w || _canvas.height !== h) { _canvas.width = w; _canvas.height = h; }
                        _ctx.drawImage(video, 0, 0, w, h);
                        try {
                            var result = _reader.decodeFromCanvas(_canvas);
                            if (result && result.text) { done = true; resolve(result.text); return; }
                        } catch (ex) {
                            if (ex && ex.name !== 'NotFoundException') console.warn('[Scanner] ZXing:', ex.message);
                        }
                    }

                    _scanTimer = setInterval(scanFrame, SCAN_INTERVAL_MS);
                    setTimeout(function () {
                        if (done) return;
                        done = true; cancelScan(); reject(new Error('timeout'));
                    }, 30000);
                });
            });
        }

        async function open() {
            if (_open) return;
            _open = true; _handled = false;
            setStatus('Kamera baslatiliyor...'); setEngine('-');

            var stream;
            try {
                stream = await acquireStream();
            } catch (e) {
                _open = false;
                var msg =
                    e.name === 'NotAllowedError'  ? 'Kamera izni reddedildi.' :
                    e.name === 'NotFoundError'    ? 'Kamera bulunamadi.' :
                    e.name === 'NotReadableError' ? 'Kamera baska uygulama tarafindan kullaniliyor.' :
                    'Kamera acilamadi: ' + e.message;
                showToast(msg, 'error'); return;
            }
            _stream = stream;
            _track  = stream.getVideoTracks()[0];

            var video = getVideo();
            if (!video) { close(); return; }
            video.srcObject = stream;
            video.setAttribute('playsinline', '');
            video.muted = true;
            try { await video.play(); } catch (e) {}
            await waitForVideoReady(video);
            setStatus('Taranıyor⬦');

            if ('BarcodeDetector' in window) {
                setEngine('BarcodeDetector (⚡ hızlı)');
                try {
                    var raw = await runBarcodeDetector(video);
                    if (_open) deliver(raw);
                    return;
                } catch (reason) {
                    if (!_open) return;
                    console.info('[Scanner] BarcodeDetector ' + reason + ' → ZXing');
                    if (reason === 'timeout') showToast('ZXing motoruna geçiliyor⬦', 'warning');
                }
            }

            setEngine('ZXing (evrensel)');
            setStatus('Taranıyor⬦ (ZXing canvas)');
            try {
                var raw2 = await runZXingCanvas(video);
                if (_open) deliver(raw2);
            } catch (e) {
                if (!_open) return;
                if (e.message === 'timeout') {
                    showToast('30 saniye barkod bulunamadı. Tekrar deneyin.', 'warning');
                } else {
                    console.error('[Scanner] ZXing canvas error:', e);
                    showToast('Barkod okunamadı. Lütfen manuel girin.', 'error');
                }
                close();
            }
        }

        function close() {
            _open = false; _handled = false;
            cancelBD(); cancelRAF(); cancelScan();
            if (_reader) { try { _reader.reset(); } catch (e) {} _reader = null; }
            if (_stream) {
                _stream.getTracks().forEach(function (t) { try { t.stop(); } catch (e) {} });
                _stream = null;
            }
            var video = getVideo();
            if (video) { try { video.pause(); } catch (e) {} video.srcObject = null; }
            _track = null; _torchOn = false;
        }

        async function toggleTorch() {
            if (!_track) { showToast('Fener desteklenmiyor', 'warning'); return; }
            try {
                var caps = _track.getCapabilities ? _track.getCapabilities() : {};
                if (!caps.torch) { showToast('Bu cihaz feneri desteklemiyor', 'warning'); return; }
                _torchOn = !_torchOn;
                await _track.applyConstraints({ advanced: [{ torch: _torchOn }] });
                var btn = document.querySelector('.torch-btn');
                if (btn) {
                    btn.textContent = _torchOn ? '🔦 Kapat' : '🔦 Fener';
                    btn.classList.toggle('on', _torchOn);
                }
            } catch (e) { showToast('Fener açılamadı', 'warning'); }
        }

        return { open, close, toggleTorch };
    }());

    /* ============================================================
       CATALOG LOOKUP — yeni çift-tanımlayıcı lookup
       Barkod okutulduğunda veya manuel girildiğinde tetiklenir.
       lookupProduct() hem barkod hem ürün no'yu arar.
    ============================================================ */
    function catalogLookup(identifier) {
        if (!identifier || identifier.length < 3) {
            const hint = document.getElementById('catalog-hint');
            if (hint) hint.style.display = 'none';
            return;
        }

        const hit = store.lookupProduct(identifier);

        if (!hit) {
            const hint = document.getElementById('catalog-hint');
            if (hint) hint.style.display = 'none';
            return;
        }

        // Ürün adı ve kategoriyi otomatik doldur
        store.newProduct.name     = hit.name;
        store.newProduct.category = hit.category || store.newProduct.category;
        // Ürün no varsa otomatik doldur (barkodla arama yapıldıysa)
        if (hit.productNo) store.newProduct.productNo = hit.productNo;

        const nameEl = document.getElementById('product-name-input');
        if (nameEl) nameEl.value = hit.name;

        const catEl = document.querySelector('select[onchange*="newProduct.category"]');
        if (catEl) catEl.value = hit.category || '';

        const pnoEl = document.getElementById('product-no-input');
        if (pnoEl && hit.productNo) pnoEl.value = hit.productNo;

        const hint = document.getElementById('catalog-hint');
        const hintText = document.getElementById('catalog-hint-text');
        if (hint && hintText) {
            hintText.textContent = 'Ürün katalogda bulundu: ' + hit.name +
                (hit.productNo ? ' · Ürün No: ' + hit.productNo : '') +
                (hit.category  ? ' (' + hit.category + ')' : '');
            hint.style.display = 'flex';
        }
    }

    function dismissCatalogHint() {
        const hint = document.getElementById('catalog-hint');
        if (hint) hint.style.display = 'none';
    }

    function openExpiryDatePicker() {
        const input = document.getElementById('expiry-date-input');
        if (!input) return;
        if (typeof input.showPicker === 'function') { input.showPicker(); return; }

    /* =============================================
       CATALOG FILE UPLOAD HANDLER
       Çakışma uyarılarını admin'e gösterir
    ============================================= */
    function handleCatalogUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const statusEl   = document.getElementById('catalog-upload-status');
        const conflictEl = document.getElementById('catalog-conflict-list');
        if (statusEl) { statusEl.style.color = 'var(--accent-cyan)'; statusEl.textContent = 'İşleniyor...'; }
        if (conflictEl) conflictEl.innerHTML = '';

        const isCsv = file.name.toLowerCase().endsWith('.csv');
        const reader = new FileReader();

        reader.onload = async function(e) {
            try {
                let rows = [];

                if (isCsv) {
                    const text = e.target.result;
                    const lines = text.split(/\r?\n/).filter(l => l.trim());
                    if (lines.length < 2) throw new Error('CSV en az 2 satır olmalı');
                    const delim = (lines[0].split(';').length > lines[0].split(',').length) ? ';' : ',';
                    const headers = lines[0].split(delim).map(h => h.replace(/^"|"$/g,'').trim());
                    rows = lines.slice(1).map(line => {
                        const vals = line.split(delim).map(v => v.replace(/^"|"$/g,'').trim());
                        const obj = {};
                        headers.forEach((h, i) => { obj[h] = vals[i] || ''; });
                        return obj;
                    });
                } else {
                    const data = new Uint8Array(e.target.result);
                    const wb   = XLSX.read(data, { type: 'array' });
                    const ws   = wb.Sheets[wb.SheetNames[0]];
                    rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
                }

                const locCreated = [];
                const locUnknown = [];
                const filteredRows = rows.filter(row => {
                    const nr = {};
                    Object.keys(row).forEach(k => { nr[normKey(k)] = String(row[k] || '').trim(); });
                    const rawLoc = LocationManager.extractLocationFromRow(nr);
                    if (!rawLoc) return true;
                    const resolved = store.locationMgr.resolveForCsv(rawLoc, store.currentUser.name, store.currentUser.role);
                    if (resolved.created) { locCreated.push(resolved.rawName); return true; }
                    if (resolved.unknown) { locUnknown.push(resolved.rawName); return false; }
                    return true;
                });

                let added = 0, skipped = 0, conflicts = [];

                if (store.authMode === 'supabase') {
                    const result = await upsertCatalogRowsToSupabase(filteredRows);
                    added = result.added;
                    skipped = result.skipped + (rows.length - filteredRows.length);
                    await loadCatalogFromSupabase();
                } else {
                    const result = store.importCatalogRows(filteredRows);
                    added   = result.added;
                    skipped = result.skipped + (rows.length - filteredRows.length);
                    conflicts = result.conflicts || [];
                }

                if (statusEl) {
                    statusEl.style.color = added > 0 ? 'var(--accent-green)' : 'var(--accent-amber)';
                    statusEl.textContent = `✅ ${added} ürün eklendi` +
                        (skipped > 0 ? `, ${skipped} satır atlandı` : '');
                }

                if (conflictEl && locCreated.length > 0) {
                    conflictEl.innerHTML += `<div class="loc-csv-warn">Admin ile ${locCreated.length} yeni lokasyon olusturuldu.</div>`;
                }
                if (conflictEl && locUnknown.length > 0) {
                    conflictEl.innerHTML += `<div class="loc-csv-err">${locUnknown.length} satir bilinmeyen lokasyon nedeniyle atlandi.</div>`;
                }

                // Çakışma uyarıları — sadece admin
                if (conflicts.length > 0 && conflictEl) {
                    conflictEl.innerHTML += `
                        <div style="margin-top:10px;padding:10px 14px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;font-size:12px">
                          <strong style="color:var(--accent-amber)">⚠️ ${conflicts.length} çakışma tespit edildi (satırlar atlandı):</strong>
                          <ul style="margin-top:6px;padding-left:18px;color:var(--text-secondary)">
                            ${conflicts.slice(0,10).map(c =>
                                `<li>Barkod <code>${escapeHtml(c.barcode)}</code> zaten <em>${escapeHtml(c.existingName)}</em> ürününe başlı — <em>${escapeHtml(c.newName)}</em> için atlandı</li>`
                            ).join('')}
                            ${conflicts.length > 10 ? `<li>⬦ve ${conflicts.length - 10} daha</li>` : ''}
                          </ul>
                        </div>`;
                }

                showToast(`Katalog: ${added} ürün yüklendi${conflicts.length ? `, ${conflicts.length} çakışma` : ''}${locUnknown.length ? `, ${locUnknown.length} lokasyon hatas?` : ''}`, added > 0 ? 'success' : 'warning');
                render();

            } catch (err) {
                console.error('[Catalog] Upload error:', err);
                if (statusEl) { statusEl.style.color = 'var(--accent-red)'; statusEl.textContent = 'Hata: ' + err.message; }
                showToast('Dosya okunamadı: ' + err.message, 'error');
            }
        };

        if (isCsv) reader.readAsText(file, 'UTF-8');
        else       reader.readAsArrayBuffer(file);
    }

            </div>

            <div class="form-group">
              <label class="input-label">Son Kullanma Tarihi *</label>
              <div style="display:flex;gap:8px;align-items:center">
                <input id="expiry-date-input" class="text-input" style="flex:1" type="date"
                       value="${p.expiryDate}" oninput="store.newProduct.expiryDate=this.value" />
                <button type="button" class="btn btn-ghost btn-icon" onclick="openExpiryDatePicker()" title="Takvimden seç">📅</button>
              </div>
            </div>

            <div style="display:flex;gap:12px;margin-top:8px">
              <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="store.showAddModal=false;render()">İptal</button>
              <button class="btn btn-primary" style="flex:1;justify-content:center" onclick="store.addProduct()">💾 Kaydet &amp; Puan Kazan</button>
            </div>
          </div>
        </div>`;
    }

    /* =============================================
       RENDER - SCANNER MODAL
    ============================================= */
    function renderScannerModal() {
        if (!scannerOpen) return '';
        return `
        <div class="modal-overlay" onclick="if(event.target===this)closeScanner()" style="z-index:300">
          <div class="modal scanner-modal">
            <div class="modal-title">
              Barkod Tara
              <button class="btn btn-ghost btn-sm" onclick="closeScanner()">X</button>
            </div>
            <div class="scanner-viewport">
              <video id="scannerVideo" autoplay playsinline muted></video>
              <div class="scan-overlay">
                <div class="scan-frame">
                  <div class="scan-corner-br"></div>
                  <div class="scan-corner-bl"></div>
                  <div class="scan-line"></div>
                </div>
              </div>
            </div>
            <div class="scanner-status">Kamera baslatiliyor...</div>
            <div style="text-align:center;font-size:11px;color:var(--text-muted);font-family:var(--font-mono);margin-top:-8px;margin-bottom:8px">
              Motor: <span class="scanner-engine-label">-</span>
            </div>
            <div class="scanner-controls">
              <button class="torch-btn" onclick="Scanner.toggleTorch()">Fener</button>
              <button class="btn btn-ghost" onclick="closeScanner()">Iptal</button>
            </div>
            <p style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:12px">
              EAN-13 | CODE-128 | QR desteklenir. Kamerayi barkoda yaklastirin.
            </p>
          </div>
        </div>`;
    }

    /* =============================================
       RENDER — FAB (değişmedi)
    ============================================= */
    function renderFAB() {
        if (!store.hasPermission('add')) return '';
        return `<button class="fab" onclick="store.showAddModal=true;render()" title="Yeni ürün ekle">?</button>`;
    }

    /* =============================================
       RENDER — AUTH (değişmedi)
    ============================================= */
    function renderAuthScreen() {
        document.getElementById('app').innerHTML = `
        <div class="auth-screen">
          <div class="auth-card">
            <div class="auth-logo">🏪</div>
            <div class="auth-title">SKT Kontrolü Pro</div>
            <div class="auth-sub">${authState.mode === 'signup' ? 'Yeni hesap oluşturun' : 'Supabase hesabınızla giriş yapın'}</div>
            ${authState.error ? `<div class="error-box">${escapeHtml(authState.error)}</div>` : ''}
            ${authState.mode === 'signup' ? `
            <div class="form-group">
              <label class="input-label">Ad Soyad</label>
              <input class="text-input" type="text" value="${authState.fullName}" oninput="authSetField('fullName',this.value)" placeholder="Ad Soyad" />
            </div>
            <div class="form-group">
              <label class="input-label">İxletme Adı (Opsiyonel)</label>
              <input class="text-input" type="text" value="${authState.tenantName}" oninput="authSetField('tenantName',this.value)" placeholder="Örnek Market" />
            </div>
            <div class="form-group">
              <label class="input-label">Davet Kodu *</label>
              <input class="text-input" type="text" value="${authState.inviteCode}" oninput="authSetField('inviteCode',this.value)" placeholder="ORNEK-INVITE-2026" />
            </div>` : ''}
            <div class="form-group">
              <label class="input-label">E-posta</label>
              <input class="text-input" type="email" value="${authState.email}" oninput="authSetField('email',this.value)" placeholder="mail@ornek.com" />
            </div>
            <div class="form-group">
              <label class="input-label">Şifre</label>
              <input class="text-input" type="password" value="${authState.password}" oninput="authSetField('password',this.value)" placeholder="••••••••" />
            </div>
            <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" onclick="${authState.mode === 'signup' ? 'submitSignup()' : 'submitLogin()'}" ${authState.loading?'disabled':''}>
              ${authState.loading ? '⏳ İşleniyor...' : (authState.mode === 'signup' ? '📝 Kayıt Ol' : '🔐 Giriş Yap')}
            </button>
            <button class="btn btn-ghost" style="width:100%;justify-content:center;padding:10px;margin-top:10px" onclick="authSetMode('${authState.mode === 'signup' ? 'login' : 'signup'}')" ${authState.loading?'disabled':''}>
              ${authState.mode === 'signup' ? 'Zaten hesabın var mı? Giriş Yap' : 'Hesabın yok mu? Kayıt Ol'}
            </button>
          </div>
        </div>`;
        normalizeVisibleText(document.getElementById('app'));
    }

    /* =============================================
       MAIN RENDER
    ============================================= */
    function render() {
        let content = '';
        if (store.currentView === 'dashboard')   content = renderDashboard();
        else if (store.currentView === 'products')    content = renderProducts();
        else if (store.currentView === 'leaderboard') content = renderLeaderboard();
        else if (store.currentView === 'badges')      content = renderBadges();
        else if (store.currentView === 'users')       content = renderUsers();
        else if (store.currentView === 'tasks')       content = renderTasks();
        else if (store.currentView === 'locations')   content = renderLocations();
        else if (store.currentView === 'catalog')     content = renderCatalog();

        document.getElementById('app').innerHTML = `
          ${renderHeader()}
          ${renderNav()}
          <main class="main">${content}</main>
          ${renderFAB()}
          ${renderAddModal()}
          ${renderScannerModal()}`;
        normalizeVisibleText(document.getElementById('app'));
    }

    /* =============================================
       SERVICE WORKER
    ============================================= */
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            fetch('./sw.js', { method: 'HEAD' })
                .then(r => { if (r.ok) return navigator.serviceWorker.register('./sw.js'); })
                .then(r => r && console.log('[SW] Registered:', r.scope))
                .catch(() => {});
        });
    }

    /* =============================================
       INIT
    ============================================= */
    document.addEventListener('DOMContentLoaded', async () => {
        const ok = await initRoleFromSupabase();
        if (ok) { render(); } else { renderAuthScreen(); }
    });
    </script>
</body>
</html>
